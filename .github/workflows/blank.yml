name: Renommer PNG Incrementiel Global

on:
  workflow_dispatch:

# Autorise le bot à modifier et enregistrer les fichiers
permissions:
  contents: write

jobs:
  rename-png:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Renommer les fichiers PNG
        run: |
          python3 -c "
          import os

          # 1. Lister tous les dossiers (exclut les dossiers cachés)
          target_dirs = []
          for root, subdirs, files in os.walk('.'):
              subdirs[:] = sorted([d for d in subdirs if not d.startswith('.')])
              if root != '.':
                  target_dirs.append(root)

          target_dirs.sort()

          # 2. Passe 1 : Renommage temporaire avec compteur global
          temp_records = []
          global_counter = 1

          for d in target_dirs:
              all_files = sorted(os.listdir(d))
              png_files = [f for f in all_files if f.lower().endswith('.png') and not f.startswith('__tmp_')]
              
              for f in png_files:
                  old_path = os.path.join(d, f)
                  temp_name = f'__tmp_{global_counter}__.png'
                  temp_path = os.path.join(d, temp_name)
                  os.rename(old_path, temp_path)
                  temp_records.append((temp_path, d))
                  global_counter += 1

          # 3. Passe 2 : Noms finaux continuels (item1.png, item2.png, ...)
          for item_num, (temp_path, d) in enumerate(temp_records, start=1):
              final_path = os.path.join(d, f'item{item_num}.png')
              os.rename(temp_path, final_path)
              print(f'Renommé : {temp_path} -> {final_path}')
          "

      - name: Enregistrer et envoyer les modifications
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Renommage incrémental continu des PNG" || exit 0
          git push
